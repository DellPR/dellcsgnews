<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>343 Monitor</title>
  <meta name="theme-color" content="#0672CB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="343 Monitor">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json?v=20260704c">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon-32.png?v=20260704c">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/icon-16.png?v=20260704c">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/icon-180.png?v=20260704c">
  <link rel="apple-touch-startup-image" href="assets/icons/splash-1170x2532.png?v=20260704c" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="assets/icons/splash-1290x2796.png?v=20260704c" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="assets/icons/splash-2048x2732.png?v=20260704c" media="(min-device-width: 768px) and (max-device-width: 1024px) and (-webkit-min-device-pixel-ratio: 2)">
  <link rel="stylesheet" href="assets/styles.20260713b.css?v=20260713b">
</head>
<body>
  <div class="splash-screen" id="splashScreen" aria-hidden="true"><div><strong>343</strong><span>MONITOR</span></div></div>
  <header class="topbar">
    <div class="brand">
      <div class="mark"><strong>DELL</strong><span>TECHNOLOGIES</span></div>
      <div>
        <h1>343 Monitor</h1>
        <p class="dek"><strong>CSG ONLY</strong> live view of the media, YouTube and X Watch signals behind the newsletters, built for quick scanning and deeper follow-up.</p>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="controls" aria-label="Filters">
      <div class="view-switch" id="viewSwitch" aria-label="Hub sections">
        <button type="button" class="active" data-view="feed">News Feed</button>
        <button type="button" data-view="metrics">Brand Metrics</button>
      </div>
      <div class="search-wrap">
        <input id="search" type="search" placeholder="Search stories, products, outlets">
      </div>
      <div class="tabs" id="tabs">
        <button type="button" class="active" data-filter="all">All</button>
        <button type="button" data-filter="dell">Dell</button>
        <button type="button" data-filter="competitor">Competitors</button>
        <button type="button" data-filter="market">Market</button>
        <button type="button" data-filter="deals">Deals</button>
        <button type="button" data-filter="review">Reviews</button>
        <button type="button" data-filter="youtube">YouTube</button>
        <button type="button" data-filter="x">X Watch</button>
        <button type="button" data-filter="br">Brazilian Outlets</button>
      </div>
      <div class="product-filter" id="productFilter" aria-label="Dell product filters">
        <span>Dell products</span>
        <button type="button" class="active" data-product-filter="all">All Dell</button>
        <button type="button" data-product-filter="xps">XPS</button>
        <button type="button" data-product-filter="alienware-laptops">Alienware laptops</button>
        <button type="button" data-product-filter="alienware-monitors">Alienware monitors</button>
        <button type="button" data-product-filter="alienware-desktops">Alienware desktops</button>
        <button type="button" data-product-filter="dell-laptops">Dell laptops</button>
      </div>
      <div class="competitor-filter" id="competitorFilter" aria-label="Competitor brand filters">
        <span>Competitors</span>
        <button type="button" class="active" data-competitor-filter="all">All competitors</button>
        <button type="button" data-competitor-filter="hp">HP</button>
        <button type="button" data-competitor-filter="lenovo">Lenovo</button>
        <button type="button" data-competitor-filter="apple">Apple</button>
        <button type="button" data-competitor-filter="asus">Asus</button>
        <button type="button" data-competitor-filter="acer">Acer</button>
        <button type="button" data-competitor-filter="msi">MSI</button>
        <button type="button" data-competitor-filter="framework">Framework</button>
        <button type="button" data-competitor-filter="samsung">Samsung</button>
        <button type="button" data-competitor-filter="microsoft">Microsoft</button>
        <button type="button" data-competitor-filter="lg">LG</button>
        <button type="button" data-competitor-filter="razer">Razer</button>
        <button type="button" data-competitor-filter="positivo">Positivo</button>
      </div>
      <div class="youtube-brand-filter" id="youtubeBrandFilter" aria-label="YouTube brand filters">
        <span>YouTube brands</span>
        <button type="button" class="active" data-youtube-brand-filter="all">All YouTube</button>
        <button type="button" data-youtube-brand-filter="dell">Dell</button>
        <button type="button" data-youtube-brand-filter="alienware">Alienware</button>
        <button type="button" data-youtube-brand-filter="apple">Apple</button>
        <button type="button" data-youtube-brand-filter="asus">Asus</button>
        <button type="button" data-youtube-brand-filter="lenovo">Lenovo</button>
        <button type="button" data-youtube-brand-filter="hp">HP</button>
        <button type="button" data-youtube-brand-filter="msi">MSI</button>
        <button type="button" data-youtube-brand-filter="valve">Valve</button>
      </div>
      <div class="status-row">
        <div class="status" id="meta">Loading latest export...</div>
        <button type="button" class="refresh-button" id="refreshFeed" aria-label="Refresh latest news">Refresh</button>
      </div>
    </section>

    <section class="metrics-view" id="metricsView" hidden>
      <section class="section-head">
        <span></span>
        <h2>Brand Metrics</h2>
      </section>
      <div class="metric-window" id="metricWindow" aria-label="Brand metric time range">
        <button type="button" class="active" data-metric-window="all">All time</button>
        <button type="button" data-metric-window="30d">Last 30 days</button>
        <button type="button" data-metric-window="7d">Last 7 days</button>
        <button type="button" data-metric-window="24h">Last 24h</button>
      </div>
      <section class="metrics-dashboard" id="brandMetrics"></section>
    </section>

    <section class="section-head" id="topStoryHead">
      <span></span>
      <h2>Top Story</h2>
    </section>
    <section class="highlights" id="highlights"></section>

    <section class="section-head" id="feedHead">
      <span></span>
      <h2>CSG NEWS FEED</h2>
    </section>
    <section class="feed" id="feed"></section>
    <button type="button" class="load-more" id="loadMore">Load more</button>
  </main>

  <script src="data/feed.js?v=20260713b"></script>
  <script src="assets/app.20260713b.js?v=20260713b"></script>
</body>
</html>
